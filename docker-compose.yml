version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: budgie_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: budgie_db
      MYSQL_USER: budgie_user
      MYSQL_PASSWORD: budgie_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3307:3306"
    networks:
      - budgie_network

  # PHP Apache Application
  app:
    build: .
    container_name: budgie_app
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: budgie_db
      DB_USER: budgie_user
      DB_PASS: budgie_password
      APP_URL: http://localhost:8080
      APP_ENV: production
      SECRET_KEY: your-secret-key-change-this-in-production
      STRIPE_PUBLISHABLE_KEY: pk_test_your_stripe_publishable_key
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
    volumes:
      - ./logs:/var/www/html/logs
      - ./public/uploads:/var/www/html/public/uploads
    ports:
      - "8082:80"
    networks:
      - budgie_network

  # phpMyAdmin (optional, for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: budgie_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: budgie_user
      PMA_PASSWORD: budgie_password
    ports:
      - "8083:80"
    networks:
      - budgie_network

volumes:
  mysql_data:

networks:
  budgie_network:
    driver: bridge
