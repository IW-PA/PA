<VirtualHost *:80>
    ServerName localhost

    # Serve from the project root (like WAMP serving www/PA). The application's
    # path logic (redirect(), header.php <base href>, index.php) expects "/public/"
    # to appear in the URL, so the document root must be the project root.
    DocumentRoot /var/www/html
    DirectoryIndex index.php

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- Hardening: deny direct web access to non-public assets ---
    # PHP includes reach these on the filesystem, so denying HTTP access is safe.
    # "scripts" holds maintenance tooling (seeder, DB cleanup). It is PHP, so it
    # would otherwise be executable over HTTP by anyone who guesses the path.
    <DirectoryMatch "^/var/www/html/(src|database|docker|tests|scripts|\.git|\.vs)(/|$)">
        Require all denied
    </DirectoryMatch>

    # Block dumps, docs, archives, scripts, databases and env files anywhere under the root.
    <FilesMatch "\.(sql|md|pdf|sh|bat|example|wamp|ya?ml|backup|sqlite|db|rvf.*|slnx|mpack|vsidx)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    # Logging
    # A container has to log to its own streams: anything written to a file under
    # ${APACHE_LOG_DIR} is invisible to `docker logs` and is destroyed by every
    # `docker compose up -d --build`, which is what made production errors
    # impossible to diagnose. Apache runs as PID 1, so these resolve correctly.
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined

    # PHP settings
    # log_errors routes PHP diagnostics to the SAPI logger, i.e. the ErrorLog above.
    php_flag log_errors On
    php_value upload_max_filesize 10M
    php_value post_max_size 10M
    php_value memory_limit 256M
    php_value max_execution_time 300
</VirtualHost>
