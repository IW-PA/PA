<VirtualHost *:80>
    ServerName localhost

    # Serve from the project root (like WAMP serving www/PA). The application's
    # path logic (redirect(), header.php <base href>, index.php) expects "/public/"
    # to appear in the URL, so the document root must be the project root.
    DocumentRoot /var/www/html
    DirectoryIndex index.php

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --- Hardening: deny direct web access to non-public assets ---
    # PHP includes reach these on the filesystem, so denying HTTP access is safe.
    <DirectoryMatch "^/var/www/html/(src|database|docker|tests|\.git|\.vs)(/|$)">
        Require all denied
    </DirectoryMatch>

    # Block dumps, docs, archives, scripts and env files anywhere under the root.
    <FilesMatch "\.(sql|md|pdf|sh|bat|example|wamp|ya?ml|backup|sqlite|slnx|mpack|vsidx)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/budgie_error.log
    CustomLog ${APACHE_LOG_DIR}/budgie_access.log combined

    # PHP settings
    php_value upload_max_filesize 10M
    php_value post_max_size 10M
    php_value memory_limit 256M
    php_value max_execution_time 300
</VirtualHost>
